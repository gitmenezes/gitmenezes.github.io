<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sniply Clone - Generator</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f2f5; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 400px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        #result-container { margin-top: 20px; display: none; }
        #final-url { width: 100%; padding: 10px; background: #eef; border: 1px dashed #77a; font-size: 11px; word-break: break-all; }
        .copy-btn { background: #28a745; margin-top: 5px; }
    </style>
</head>
<body>

<div class="card" id="main-card">
    <h2>Gerador de Link Pro</h2>
    <input type="text" id="site" placeholder="Link da Notícia">
    <input type="text" id="cta" placeholder="Texto da Oferta">
    <input type="text" id="img" placeholder="Link da Imagem do Produto">
    <input type="text" id="aff" placeholder="Seu Link de Afiliado">
    <button onclick="generate()">Gerar Link Web</button>

    <div id="result-container">
        <p>Seu link pronto para compartilhar:</p>
        <textarea id="final-url" rows="4" readonly></textarea>
        <button class="copy-btn" onclick="copy()">Copiar Link</button>
    </div>
</div>

<script>
    function generate() {
        const data = {
            s: document.getElementById('site').value,
            t: document.getElementById('cta').value,
            i: document.getElementById('img').value,
            a: document.getElementById('aff').value
        };

        // Aqui você usa a URL onde este arquivo HTML está hospedado online
        // Se você não quer hospedar, você pode usar um serviço como o "GitHub Pages"
        const baseUrl = window.location.href.split('?')[0]; 
        
        // Se estiver rodando local, ele avisa que precisa de um link web
        if(baseUrl.startsWith('file:///')) {
            alert("Atenção: Para o link funcionar em outros celulares/PCs, você precisa abrir este gerador a partir de um link https:// e não de um arquivo no seu C:/");
        }

        const query = `?s=${btoa(data.s)}&t=${btoa(data.t)}&i=${btoa(data.i)}&a=${btoa(data.a)}`;
        const finalUrl = baseUrl + query;

        document.getElementById('final-url').value = finalUrl;
        document.getElementById('result-container').style.display = 'block';
    }

    function copy() {
        const copyText = document.getElementById("final-url");
        copyText.select();
        document.execCommand("copy");
        alert("Link copiado! Agora passe no Bitly para encurtar.");
    }

    // Lógica para exibir o conteúdo caso o link tenha parâmetros
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('s')) {
            document.body.innerHTML = `
                <style>
                    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
                    iframe { width: 100%; height: 100%; border: none; }
                    #overlay { position: fixed; bottom: 20px; left: 20px; background: white; padding: 15px; border-radius: 10px; box-shadow: 0 5px 20px rgba(0,0,0,0.3); display: flex; align-items: center; gap: 15px; z-index: 9999; border-left: 5px solid #007bff; max-width: 350px; }
                    #overlay img { width: 60px; height: 60px; border-radius: 5px; object-fit: cover; }
                    #overlay a { text-decoration: none; background: #007bff; color: white; padding: 8px 12px; border-radius: 5px; font-size: 13px; font-weight: bold; }
                </style>
                <div id="overlay">
                    <img src="${atob(urlParams.get('i'))}">
                    <div>
                        <p style="margin:0 0 5px; font-size:14px; font-weight:bold;">${atob(urlParams.get('t'))}</p>
                        <a href="${atob(urlParams.get('a'))}" target="_blank">APROVEITAR</a>
                    </div>
                </div>
                <iframe src="${atob(urlParams.get('s'))}"></iframe>
            `;
        }
    }
</script>
</body>
</html>
